<!doctype html>
<html lang="es" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transmisiones // TEMPLATE </title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&amp;family=Share+Tech+Mono&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.8; }
      94% { opacity: 1; }
      97% { opacity: 0.9; }
      98% { opacity: 1; }
    }
    
    @keyframes scanline {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 5px currentColor) drop-shadow(0 0 10px currentColor); }
      50% { filter: drop-shadow(0 0 10px currentColor) drop-shadow(0 0 20px currentColor) drop-shadow(0 0 30px currentColor); }
    }
    
    @keyframes data-stream {
      0% { background-position: 0% 0%; }
      100% { background-position: 0% 100%; }
    }
    
    @keyframes hologram {
      0%, 100% { transform: perspective(500px) rotateX(0deg); opacity: 1; }
      25% { transform: perspective(500px) rotateX(0.5deg); opacity: 0.98; }
      50% { transform: perspective(500px) rotateX(0deg); opacity: 1; }
      75% { transform: perspective(500px) rotateX(-0.5deg); opacity: 0.99; }
    }
    
    @keyframes circuit-flow {
      0% { stroke-dashoffset: 1000; }
      100% { stroke-dashoffset: 0; }
    }
    
    @keyframes text-glitch {
      0%, 100% { text-shadow: 2px 0 #00f0ff, -2px 0 #ff00ff; }
      25% { text-shadow: -2px 0 #00f0ff, 2px 0 #ff00ff; }
      50% { text-shadow: 2px 2px #00f0ff, -2px -2px #ff00ff; }
      75% { text-shadow: -2px 2px #00f0ff, 2px -2px #ff00ff; }
    }
    
    .cyber-bg {
      background: 
        radial-gradient(ellipse at 50% 0%, rgba(0, 240, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(180, 0, 255, 0.1) 0%, transparent 40%),
        radial-gradient(ellipse at 20% 80%, rgba(0, 100, 255, 0.1) 0%, transparent 40%),
        linear-gradient(180deg, #0a0a12 0%, #0d0d1a 50%, #0a0a12 100%);
    }
    
    .circuit-pattern {
      background-image: 
        linear-gradient(90deg, transparent 49.5%, rgba(0, 240, 255, 0.03) 49.5%, rgba(0, 240, 255, 0.03) 50.5%, transparent 50.5%),
        linear-gradient(0deg, transparent 49.5%, rgba(0, 240, 255, 0.03) 49.5%, rgba(0, 240, 255, 0.03) 50.5%, transparent 50.5%);
      background-size: 40px 40px;
    }
    
    .hologram-effect {
      animation: hologram 4s ease-in-out infinite, flicker 8s linear infinite;
    }
    
    .glow-text {
      animation: glow-pulse 3s ease-in-out infinite;
    }
    
    .glitch-text {
      animation: text-glitch 0.3s ease-in-out infinite;
    }
    
    .scanline::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(180deg, transparent, rgba(0, 240, 255, 0.4), transparent);
      animation: scanline 4s linear infinite;
      pointer-events: none;
    }
    
    .data-panel {
      background: 
        linear-gradient(135deg, rgba(0, 240, 255, 0.05) 0%, transparent 50%),
        linear-gradient(225deg, rgba(180, 0, 255, 0.05) 0%, transparent 50%),
        rgba(10, 10, 20, 0.8);
      border: 1px solid;
      border-image: linear-gradient(135deg, #00f0ff, #b400ff) 1;
      box-shadow: 
        0 0 20px rgba(0, 240, 255, 0.2),
        inset 0 0 30px rgba(0, 240, 255, 0.05);
    }
    
    .neon-border {
      position: relative;
    }
    
    .neon-border::before {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, #00f0ff, #b400ff, #00f0ff);
      z-index: -1;
      filter: blur(8px);
      opacity: 0.5;
      animation: glow-pulse 3s ease-in-out infinite;
    }
    
    .mono-text {
      font-family: 'Share Tech Mono', monospace;
    }
    
    .title-font {
      font-family: 'Orbitron', sans-serif;
    }
    
    .data-row {
      position: relative;
      transition: all 0.3s ease;
    }
    
    .data-row:hover {
      background: linear-gradient(90deg, rgba(0, 240, 255, 0.1) 0%, transparent 100%);
      padding-left: 1rem;
    }
    
    .data-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 1px;
      background: #00f0ff;
      transition: width 0.3s ease;
    }
    
    .data-row:hover::before {
      width: 8px;
    }
    
    .corner-accent {
      position: absolute;
      width: 20px;
      height: 20px;
      border-color: #00f0ff;
    }
    
    .corner-tl { top: 0; left: 0; border-top: 2px solid; border-left: 2px solid; }
    .corner-tr { top: 0; right: 0; border-top: 2px solid; border-right: 2px solid; }
    .corner-bl { bottom: 0; left: 0; border-bottom: 2px solid; border-left: 2px solid; }
    .corner-br { bottom: 0; right: 0; border-bottom: 2px solid; border-right: 2px solid; }

    .control-btn {
      border: 1px solid rgba(34, 211, 238, 0.35);
      background: rgba(2, 6, 23, 0.8);
      color: #c7f9ff;
      border-radius: 0.5rem;
      padding: 0.45rem 0.75rem;
      font-size: 0.75rem;
      line-height: 1.1;
      transition: all 0.2s ease;
    }

    .control-btn:hover {
      border-color: rgba(34, 211, 238, 0.75);
      background: rgba(34, 211, 238, 0.14);
    }

    .editable-assignee {
      cursor: text;
      border-bottom: 1px dashed rgba(34, 211, 238, 0.2);
      min-width: 120px;
      padding: 0.1rem 0.2rem;
      border-radius: 0.25rem;
    }

    .editable-assignee:focus {
      outline: none;
      border-bottom-color: rgba(34, 211, 238, 0.8);
      background: rgba(34, 211, 238, 0.12);
    }

    .edit-action {
      border: 1px solid rgba(180, 0, 255, 0.45);
      color: #e8d8ff;
      border-radius: 0.35rem;
      padding: 0.25rem 0.5rem;
      margin-left: auto;
      font-size: 0.7rem;
      line-height: 1;
    }

    .warnings-panel {
      border: 1px solid rgba(251, 191, 36, 0.5);
      background: rgba(251, 191, 36, 0.08);
      color: #fde68a;
    }

    @media (max-width: 640px) {
      .data-row {
        gap: 0.4rem;
      }

      .data-row .editable-assignee {
        flex: 1 1 100%;
      }
    }

    @media print {
      .no-print,
      .scanline::before,
      svg,
      .absolute.pointer-events-none {
        display: none !important;
      }

      body {
        background: #fff !important;
        color: #111 !important;
      }

      .data-panel {
        border: 1px solid #ddd !important;
        box-shadow: none !important;
        background: #fff !important;
      }

      .hologram-effect,
      .glow-text,
      .glitch-text {
        animation: none !important;
      }
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>

  <script>
    const defaultConfig = {
      main_title: 'TRANSMISIONES // TEMPLATE',
      left_panel_title: '> DOMINGOS_',
      right_panel_title: '> LUNES_',
      background_color: '#0a0a12',
      primary_accent: '#00f0ff',
      secondary_accent: '#b400ff',
      text_color: '#e0f7ff',
      font_family: 'Orbitron',
      font_size: 16
    };

    const LOCAL_STORAGE_KEY = 'rol_scheduler_state_v2';
    const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    const monthAbbreviations = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];

    const initialScheduleByMonth = {
      '2025-03': {
        year: 2025,
        monthIndex: 2,
        sundayAssignments: ['Ale / Adrian 📷', 'Panchito / Carlos 📷', 'Emmanuel M / Ale 📷', 'Panchito / Carlos', 'Panchito / Ale 📷'],
        mondayAssignments: ['Emmanuel R', 'Emmanuel R', 'Emmanuel R', 'Emmanuel R', 'Emmanuel R']
      },
      '2025-04': {
        year: 2025,
        monthIndex: 3,
        sundayAssignments: ['Por definir', 'Por definir', 'Por definir', 'Por definir'],
        mondayAssignments: ['Por definir', 'Por definir', 'Por definir', 'Por definir']
      }
    };

    let appState = {
      scheduleByMonth: JSON.parse(JSON.stringify(initialScheduleByMonth)),
      currentMonthKey: '2025-03',
      viewFilter: 'all',
      searchQuery: '',
      rotationPool: [],
      history: []
    };

    function saveState() {
      try {
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(appState));
      } catch (error) {
        console.error('No se pudo guardar en localStorage', error);
      }
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (!raw) {
          return;
        }

        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') {
          if (parsed.scheduleByMonth && typeof parsed.scheduleByMonth === 'object') {
            appState.scheduleByMonth = parsed.scheduleByMonth;
          }
          if (typeof parsed.currentMonthKey === 'string') {
            appState.currentMonthKey = parsed.currentMonthKey;
          }
          if (typeof parsed.viewFilter === 'string') {
            appState.viewFilter = parsed.viewFilter;
          }
          if (typeof parsed.searchQuery === 'string') {
            appState.searchQuery = parsed.searchQuery;
          }
          if (Array.isArray(parsed.rotationPool)) {
            appState.rotationPool = parsed.rotationPool;
          }
          if (Array.isArray(parsed.history)) {
            appState.history = parsed.history;
          }
        }
      } catch (error) {
        console.error('No se pudo leer localStorage', error);
      }
    }

    function getDatesForWeekday(year, monthIndex, weekday) {
      const dates = [];
      const cursor = new Date(year, monthIndex, 1);
      while (cursor.getMonth() === monthIndex) {
        if (cursor.getDay() === weekday) {
          dates.push(new Date(cursor));
        }
        cursor.setDate(cursor.getDate() + 1);
      }
      return dates;
    }

    function formatDateLabel(date) {
      const day = String(date.getDate()).padStart(2, '0');
      return `${day} ${monthAbbreviations[date.getMonth()]}`;
    }

    function escapeHtml(value) {
      return value
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function buildRows(dayType, dates, assignments, isSundayPanel, searchQuery) {
      const normalizedQuery = searchQuery.trim().toLowerCase();

      return dates.map((date, index) => {
        const assignee = assignments[index] || 'Por definir';
        if (normalizedQuery && !assignee.toLowerCase().includes(normalizedQuery)) {
          return '';
        }

        const safeAssignee = escapeHtml(assignee);
        const commonAttrs = `data-day="${dayType}" data-index="${index}" data-month="${appState.currentMonthKey}"`;

        if (isSundayPanel) {
          return `
            <div class="data-row py-2 text-cyan-100/90 flex items-start">
              <span class="text-purple-400 mr-2 flex-shrink-0">◈</span>
              <span class="text-cyan-400 flex-shrink-0">${formatDateLabel(date)}</span>
              <span class="text-purple-400/60 mx-2 flex-shrink-0">::</span>
              <span class="text-cyan-100/80 editable-assignee" contenteditable="true" ${commonAttrs}>${safeAssignee}</span>
              <button class="edit-action sm:hidden" type="button" ${commonAttrs}>Editar</button>
            </div>
          `;
        }

        return `
          <div class="data-row py-2 text-purple-100/90 flex items-start">
            <span class="text-cyan-400 mr-2 flex-shrink-0">◈</span>
            <span class="text-purple-400 flex-shrink-0">${formatDateLabel(date)}</span>
            <span class="text-cyan-400/60 mx-2 flex-shrink-0">::</span>
            <span class="text-purple-100/80 editable-assignee" contenteditable="true" ${commonAttrs}>${safeAssignee}</span>
            <button class="edit-action sm:hidden" type="button" ${commonAttrs}>Editar</button>
          </div>
        `;
      }).join('');
    }

    function updateMonthSelectOptions() {
      const monthSelect = document.getElementById('month-select');
      if (!monthSelect) {
        return;
      }

      monthSelect.innerHTML = Object.keys(appState.scheduleByMonth)
        .sort()
        .map((key) => {
          const item = appState.scheduleByMonth[key];
          return `<option value="${key}">${monthNames[item.monthIndex]} ${item.year}</option>`;
        })
        .join('');
      monthSelect.value = appState.currentMonthKey;
    }

    function getVisibleCount(assignments, query) {
      if (!query.trim()) {
        return assignments.length;
      }
      const normalized = query.trim().toLowerCase();
      return assignments.filter(item => (item || '').toLowerCase().includes(normalized)).length;
    }

    function updatePanelVisibility() {
      const leftPanel = document.getElementById('left-panel');
      const rightPanel = document.getElementById('right-panel');
      if (!leftPanel || !rightPanel) {
        return;
      }

      leftPanel.classList.remove('hidden');
      rightPanel.classList.remove('hidden');
      if (appState.viewFilter === 'sunday') {
        rightPanel.classList.add('hidden');
      } else if (appState.viewFilter === 'monday') {
        leftPanel.classList.add('hidden');
      }
    }

    function validateWeekendDuplicates(data) {
      const warnings = [];
      const sundayAssignments = data.sundayAssignments || [];
      const mondayAssignments = data.mondayAssignments || [];
      const minLength = Math.min(sundayAssignments.length, mondayAssignments.length);

      for (let i = 0; i < minLength; i += 1) {
        const sunday = (sundayAssignments[i] || '').trim().toLowerCase();
        const monday = (mondayAssignments[i] || '').trim().toLowerCase();
        if (!sunday || !monday || sunday === 'por definir' || monday === 'por definir') {
          continue;
        }
        if (sunday === monday) {
          warnings.push(`Posible duplicado en bloque ${i + 1}: ${sundayAssignments[i]} (domingo y lunes).`);
        }
      }

      return warnings;
    }

    function renderWarnings(data) {
      const alertBox = document.getElementById('validation-alert');
      if (!alertBox) {
        return;
      }

      const warnings = validateWeekendDuplicates(data);
      if (!warnings.length) {
        alertBox.classList.add('hidden');
        alertBox.textContent = '';
        return;
      }

      alertBox.classList.remove('hidden');
      alertBox.innerHTML = warnings.map((warning) => `⚠ ${escapeHtml(warning)}`).join('<br>');
    }

    function renderHistory() {
      const historyList = document.getElementById('history-list');
      if (!historyList) {
        return;
      }

      if (!appState.history.length) {
        historyList.textContent = 'Sin cambios todavía.';
        return;
      }

      const items = appState.history
        .slice(-30)
        .reverse()
        .map((entry) => {
          const stamp = new Date(entry.timestamp).toLocaleString('es-MX');
          return `<div class="py-1 border-b border-cyan-500/10">${escapeHtml(stamp)} :: ${escapeHtml(entry.message)}</div>`;
        })
        .join('');
      historyList.innerHTML = items;
    }

    function pushHistory(message) {
      appState.history.push({
        timestamp: new Date().toISOString(),
        message
      });
      if (appState.history.length > 500) {
        appState.history = appState.history.slice(-500);
      }
      renderHistory();
      saveState();
    }

    function renderMonth(key) {
      const data = appState.scheduleByMonth[key];
      if (!data) {
        return;
      }

      appState.currentMonthKey = key;
      const monthName = monthNames[data.monthIndex];
      const sundayDates = getDatesForWeekday(data.year, data.monthIndex, 0);
      const mondayDates = getDatesForWeekday(data.year, data.monthIndex, 1);

      const mainTitle = document.getElementById('main-title');
      const sundayList = document.getElementById('sunday-list');
      const mondayList = document.getElementById('monday-list');
      const leftRecords = document.getElementById('left-records');
      const rightRecords = document.getElementById('right-records');
      const syncStatus = document.getElementById('sync-status');
      const monthSelect = document.getElementById('month-select');
      const pageTitle = document.querySelector('title');
      const personSearch = document.getElementById('person-search');
      if (personSearch && personSearch.value !== appState.searchQuery) {
        personSearch.value = appState.searchQuery;
      }

      if (mainTitle) {
        mainTitle.textContent = `TRANSMISIONES // ${monthName.toUpperCase()}`;
      }
      if (pageTitle) {
        pageTitle.textContent = `Transmisiones // ${monthName}`;
      }
      if (sundayList) {
        sundayList.innerHTML = buildRows('sunday', sundayDates, data.sundayAssignments, true, appState.searchQuery);
      }
      if (mondayList) {
        mondayList.innerHTML = buildRows('monday', mondayDates, data.mondayAssignments, false, appState.searchQuery);
      }
      if (leftRecords) {
        leftRecords.textContent = `REGISTROS: ${getVisibleCount(data.sundayAssignments, appState.searchQuery)} / ${sundayDates.length}`;
      }
      if (rightRecords) {
        rightRecords.textContent = `REGISTROS: ${getVisibleCount(data.mondayAssignments, appState.searchQuery)} / ${mondayDates.length}`;
      }
      if (syncStatus) {
        const syncMonth = String(data.monthIndex + 1).padStart(2, '0');
        syncStatus.textContent = `◇ ÚLTIMA SYNC: ${data.year}.${syncMonth}.01`;
      }
      if (monthSelect && monthSelect.value !== key) {
        monthSelect.value = key;
      }

      updatePanelVisibility();
      renderWarnings(data);
      saveState();
    }

    function monthNameToIndex(name) {
      const normalized = (name || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim();

      return monthNames.findIndex((month) => {
        const monthNormalized = month
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '');
        return monthNormalized === normalized;
      });
    }

    function addMonthFromPrompt() {
      const base = appState.scheduleByMonth[appState.currentMonthKey];
      if (!base) {
        return;
      }

      const monthInput = window.prompt('Escribe el nombre del mes (ejemplo: Mayo):');
      if (!monthInput) {
        return;
      }

      const monthIndex = monthNameToIndex(monthInput);
      if (monthIndex < 0) {
        window.alert('Mes no reconocido. Usa un nombre en español como "Abril" o "Mayo".');
        return;
      }

      const defaultYear = String(base.year);
      const yearInput = window.prompt('Año del mes:', defaultYear);
      if (!yearInput) {
        return;
      }

      const year = Number(yearInput);
      if (!Number.isInteger(year) || year < 1900 || year > 3000) {
        window.alert('Año inválido.');
        return;
      }

      const key = `${year}-${String(monthIndex + 1).padStart(2, '0')}`;
      if (!appState.scheduleByMonth[key]) {
        const sundayCount = getDatesForWeekday(year, monthIndex, 0).length;
        const mondayCount = getDatesForWeekday(year, monthIndex, 1).length;
        appState.scheduleByMonth[key] = {
          year,
          monthIndex,
          sundayAssignments: Array.from({ length: sundayCount }, () => 'Por definir'),
          mondayAssignments: Array.from({ length: mondayCount }, () => 'Por definir')
        };
        pushHistory(`Mes agregado: ${monthNames[monthIndex]} ${year}.`);
      }

      updateMonthSelectOptions();
      renderMonth(key);
    }

    function applyInlineEdit(target) {
      const day = target.dataset.day;
      const index = Number(target.dataset.index);
      const monthKey = target.dataset.month;
      const data = appState.scheduleByMonth[monthKey];
      if (!data || Number.isNaN(index)) {
        return;
      }

      const listKey = day === 'sunday' ? 'sundayAssignments' : 'mondayAssignments';
      const previous = data[listKey][index] || 'Por definir';
      const nextValue = (target.textContent || '').trim() || 'Por definir';
      target.textContent = nextValue;

      if (previous === nextValue) {
        return;
      }

      data[listKey][index] = nextValue;
      pushHistory(`Editado ${day === 'sunday' ? 'domingo' : 'lunes'} #${index + 1}: "${previous}" -> "${nextValue}".`);
      renderMonth(monthKey);
    }

    function cloneAssignments(source, targetLength) {
      if (!Array.isArray(source) || !source.length) {
        return Array.from({ length: targetLength }, () => 'Por definir');
      }
      return Array.from({ length: targetLength }, (_, index) => source[index % source.length] || 'Por definir');
    }

    function cloneMonthFromCurrent() {
      const source = appState.scheduleByMonth[appState.currentMonthKey];
      if (!source) {
        return;
      }

      const nextMonthIndex = source.monthIndex === 11 ? 0 : source.monthIndex + 1;
      const nextYear = source.monthIndex === 11 ? source.year + 1 : source.year;
      const suggestedKey = `${nextYear}-${String(nextMonthIndex + 1).padStart(2, '0')}`;
      const targetInput = window.prompt('Mes destino (AAAA-MM):', suggestedKey);
      if (!targetInput) {
        return;
      }

      if (!/^\d{4}-(0[1-9]|1[0-2])$/.test(targetInput)) {
        window.alert('Formato inválido. Usa AAAA-MM.');
        return;
      }

      const [yearStr, monthStr] = targetInput.split('-');
      const targetYear = Number(yearStr);
      const targetMonthIndex = Number(monthStr) - 1;
      const targetSundayCount = getDatesForWeekday(targetYear, targetMonthIndex, 0).length;
      const targetMondayCount = getDatesForWeekday(targetYear, targetMonthIndex, 1).length;

      if (appState.scheduleByMonth[targetInput] && !window.confirm('Ese mes ya existe. ¿Sobrescribirlo?')) {
        return;
      }

      appState.scheduleByMonth[targetInput] = {
        year: targetYear,
        monthIndex: targetMonthIndex,
        sundayAssignments: cloneAssignments(source.sundayAssignments, targetSundayCount),
        mondayAssignments: cloneAssignments(source.mondayAssignments, targetMondayCount)
      };

      updateMonthSelectOptions();
      renderMonth(targetInput);
      pushHistory(`Mes clonado: ${monthNames[source.monthIndex]} ${source.year} -> ${monthNames[targetMonthIndex]} ${targetYear}.`);
    }

    function setRotationPool() {
      const currentValue = appState.rotationPool.join(', ');
      const input = window.prompt('Lista de personas separada por coma:', currentValue || 'Nombre 1, Nombre 2');
      if (!input) {
        return;
      }

      const pool = input
        .split(',')
        .map(item => item.trim())
        .filter(Boolean);

      if (!pool.length) {
        window.alert('Debes ingresar al menos una persona.');
        return;
      }

      appState.rotationPool = pool;
      pushHistory(`Rotación configurada con ${pool.length} persona(s).`);
    }

    function applyAutoRotation() {
      const data = appState.scheduleByMonth[appState.currentMonthKey];
      if (!data) {
        return;
      }

      if (!appState.rotationPool.length) {
        setRotationPool();
      }
      if (!appState.rotationPool.length) {
        return;
      }

      const pool = appState.rotationPool;
      data.sundayAssignments = data.sundayAssignments.map((_, index) => pool[index % pool.length]);
      data.mondayAssignments = data.mondayAssignments.map((_, index) => pool[(index + data.sundayAssignments.length) % pool.length]);

      pushHistory(`Auto rotación aplicada a ${monthNames[data.monthIndex]} ${data.year}.`);
      renderMonth(appState.currentMonthKey);
    }

    function downloadBlob(fileName, content, mimeType) {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    function exportJson() {
      const payload = {
        exportedAt: new Date().toISOString(),
        state: appState
      };
      downloadBlob(`rol-transmisiones-${appState.currentMonthKey}.json`, JSON.stringify(payload, null, 2), 'application/json');
      pushHistory('Exportación JSON generada.');
    }

    function exportCsv() {
      const rows = ['month_key,year,month_name,day_type,date_label,assignee'];
      Object.keys(appState.scheduleByMonth).sort().forEach((key) => {
        const month = appState.scheduleByMonth[key];
        const sundayDates = getDatesForWeekday(month.year, month.monthIndex, 0);
        const mondayDates = getDatesForWeekday(month.year, month.monthIndex, 1);

        sundayDates.forEach((date, index) => {
          const assignee = (month.sundayAssignments[index] || 'Por definir').replaceAll('"', '""');
          rows.push(`${key},${month.year},${monthNames[month.monthIndex]},domingo,${formatDateLabel(date)},"${assignee}"`);
        });
        mondayDates.forEach((date, index) => {
          const assignee = (month.mondayAssignments[index] || 'Por definir').replaceAll('"', '""');
          rows.push(`${key},${month.year},${monthNames[month.monthIndex]},lunes,${formatDateLabel(date)},"${assignee}"`);
        });
      });

      downloadBlob(`rol-transmisiones-${appState.currentMonthKey}.csv`, rows.join('\n'), 'text/csv;charset=utf-8');
      pushHistory('Exportación CSV generada.');
    }

    function normalizeImportedState(payload) {
      if (!payload || typeof payload !== 'object') {
        return null;
      }

      const candidate = payload.state && typeof payload.state === 'object' ? payload.state : payload;
      if (!candidate.scheduleByMonth || typeof candidate.scheduleByMonth !== 'object') {
        return null;
      }

      return {
        scheduleByMonth: candidate.scheduleByMonth,
        currentMonthKey: typeof candidate.currentMonthKey === 'string' ? candidate.currentMonthKey : Object.keys(candidate.scheduleByMonth)[0],
        viewFilter: typeof candidate.viewFilter === 'string' ? candidate.viewFilter : 'all',
        searchQuery: typeof candidate.searchQuery === 'string' ? candidate.searchQuery : '',
        rotationPool: Array.isArray(candidate.rotationPool) ? candidate.rotationPool : [],
        history: Array.isArray(candidate.history) ? candidate.history : []
      };
    }

    function importJsonFile(file) {
      if (!file) {
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(String(reader.result || '{}'));
          const normalized = normalizeImportedState(parsed);
          if (!normalized) {
            window.alert('JSON inválido para importar.');
            return;
          }
          appState = normalized;
          updateMonthSelectOptions();
          renderMonth(appState.currentMonthKey);
          pushHistory('Importación JSON aplicada.');
        } catch (error) {
          window.alert('No se pudo leer el JSON.');
        }
      };
      reader.readAsText(file);
    }

    async function onConfigChange(config) {
      const mainTitle = document.getElementById('main-title');
      const leftPanelTitle = document.getElementById('left-panel-title');
      const rightPanelTitle = document.getElementById('right-panel-title');

      if (mainTitle) {
        mainTitle.textContent = config.main_title || defaultConfig.main_title;
      }

      if (leftPanelTitle) {
        const titleText = config.left_panel_title || defaultConfig.left_panel_title;
        leftPanelTitle.innerHTML = `
          <span class="text-purple-400">›</span>
          <span class="glow-text">${titleText}</span>
          <span class="flex-1 h-px bg-gradient-to-r from-cyan-400/50 to-transparent ml-2"></span>
        `;
      }

      if (rightPanelTitle) {
        const titleText = config.right_panel_title || defaultConfig.right_panel_title;
        rightPanelTitle.innerHTML = `
          <span class="text-cyan-400">›</span>
          <span class="glow-text">${titleText}</span>
          <span class="flex-1 h-px bg-gradient-to-r from-purple-400/50 to-transparent ml-2"></span>

      // Apply font family

    function mapToEditPanelValues(config) {
      return new Map([
        ['main_title', config.main_title || defaultConfig.main_title],
        ['left_panel_title', config.left_panel_title || defaultConfig.left_panel_title],
        ['right_panel_title', config.right_panel_title || defaultConfig.right_panel_title]
      ]);

    if (window.elementSdk) {
      window.elementSdk.init({

    if (viewFilter) {

      viewFilter.addEventListener('change', (event) => {

    if (personSearch) {

      personSearch.addEventListener('input', (event) => {

    if (monthSelect) {

    if (addMonthBtn) {

    if (clearHistoryBtn) {

        if (!window.confirm('¿Borrar historial local?')) {

        appState.history = [];

    document.addEventListener('click', (event) => {
      const button = event.target.closest('.edit-action');
      if (!button) {

      const selector = `.editable-assignee[data-day="${button.dataset.day}"][data-index="${button.dataset.index}"][data-month="${button.dataset.month}"]`;
      const target = document.querySelector(selector);
      if (target) {

        const selection = window.getSelection();
        const range = document.createRange();
        range.selectNodeContents(target);
        selection.removeAllRanges();

    document.addEventListener('keydown', (event) => {

        return;
      }
      applyInlineEdit(target);
    });
